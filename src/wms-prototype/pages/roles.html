      <div id="page-roles" class="page">
        <header class="header">
          <div class="header-left">
            <h2>角色权限</h2>
            <div class="breadcrumb">
              <span>基础档案</span>
              <span>/</span>
              <span>角色权限</span>
            </div>
          </div>
          <div class="header-right">
            <button class="btn btn-primary btn-sm">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              新增角色
            </button>
          </div>
        </header>
        
        <div class="content">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
            <!-- Role List -->
            <div class="table-card">
              <div class="table-header">
                <span class="table-title">角色列表</span>
              </div>
              <div class="table-filters" style="background:#fff;">
                <input type="text" class="filter-input" placeholder="搜索角色名称..." id="role-search">
              </div>
              <table>
                <thead>
                  <tr>
                    <th>角色名称</th>
                    <th>人数</th>
                    <th>状态</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="role-table-body">
                  <tr class="role-row" data-role="admin" style="background:#f5f5f5;">
                    <td><span style="font-weight:600;">系统管理员</span></td>
                    <td>2 人</td>
                    <td><span class="status status-success">启用</span></td>
                    <td><button class="btn btn-outline btn-sm" onclick="editRole('admin')">编辑</button></td>
                  </tr>
                  <tr class="role-row" data-role="manager">
                    <td><span style="font-weight:600;">仓管主管</span></td>
                    <td>8 人</td>
                    <td><span class="status status-success">启用</span></td>
                    <td><button class="btn btn-outline btn-sm" onclick="editRole('manager')">编辑</button></td>
                  </tr>
                  <tr class="role-row" data-role="picker">
                    <td><span style="font-weight:600;">拣货员</span></td>
                    <td>24 人</td>
                    <td><span class="status status-success">启用</span></td>
                    <td><button class="btn btn-outline btn-sm" onclick="editRole('picker')">编辑</button></td>
                  </tr>
                  <tr class="role-row" data-role="sorter">
                    <td><span style="font-weight:600;">分拣员</span></td>
                    <td>16 人</td>
                    <td><span class="status status-success">启用</span></td>
                    <td><button class="btn btn-outline btn-sm" onclick="editRole('sorter')">编辑</button></td>
                  </tr>
                  <tr class="role-row" data-role="receiver">
                    <td><span style="font-weight:600;">收货员</span></td>
                    <td>12 人</td>
                    <td><span class="status status-success">启用</span></td>
                    <td><button class="btn btn-outline btn-sm" onclick="editRole('receiver')">编辑</button></td>
                  </tr>
                  <tr class="role-row" data-role="viewer">
                    <td><span style="font-weight:600;">查看者</span></td>
                    <td>5 人</td>
                    <td><span class="status status-default">禁用</span></td>
                    <td><button class="btn btn-outline btn-sm" onclick="editRole('viewer')">编辑</button></td>
                  </tr>
                </tbody>
              </table>
            </div>
            
            <!-- Permission Tree -->
            <div class="table-card">
              <div class="table-header">
                <span class="table-title">权限配置</span>
                <button class="btn btn-primary btn-sm" onclick="savePermissions()">保存配置</button>
              </div>
              <div style="padding:16px 20px;overflow-y:auto;max-height:500px;" id="permission-tree">
                <!-- Dashboard -->
                <div class="perm-module">
                  <label style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #e5e5e5;cursor:pointer;">
                    <input type="checkbox" class="perm-module-check" data-module="dashboard">
                    <span style="font-weight:600;font-size:13px;">📊 综合看板</span>
                  </label>
                  <div style="padding-left:28px;padding:8px 0 8px 28px;">
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="dashboard:view">查看看板</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="dashboard:export">导出数据</label>
                  </div>
                </div>
                
                <!-- Staff -->
                <div class="perm-module">
                  <label style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #e5e5e5;cursor:pointer;">
                    <input type="checkbox" class="perm-module-check" data-module="staff">
                    <span style="font-weight:600;font-size:13px;">👥 基础档案</span>
                  </label>
                  <div style="padding-left:28px;padding:8px 0 8px 28px;">
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="staff:view">查看人员</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="staff:add">新增人员</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="staff:edit">编辑人员</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="accounts:view">查看PDA账号</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="accounts:bind">绑定/解绑设备</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="warehouse:view">查看仓库</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="products:view">查看商品库</label>
                  </div>
                </div>
                
                <!-- Operations -->
                <div class="perm-module">
                  <label style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #e5e5e5;cursor:pointer;">
                    <input type="checkbox" class="perm-module-check" data-module="operation">
                    <span style="font-weight:600;font-size:13px;">⚙️ 作业配置</span>
                  </label>
                  <div style="padding-left:28px;padding:8px 0 8px 28px;">
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="wave:view">查看波次</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="wave:add">创建波次</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="sorting:view">查看分拣</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="picking:view">查看拣货</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="picking:execute">执行拣货</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="processing:view">查看加工</label>
                  </div>
                </div>
                
                <!-- Inventory -->
                <div class="perm-module">
                  <label style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #e5e5e5;cursor:pointer;">
                    <input type="checkbox" class="perm-module-check" data-module="inventory">
                    <span style="font-weight:600;font-size:13px;">📦 库存中心</span>
                  </label>
                  <div style="padding-left:28px;padding:8px 0 8px 28px;">
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="location:view">货位查询</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="location:edit">编辑货位</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="inventory:query">库存查询</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="inventory:adjust">库存调整</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="alert:view">预警查看</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="stocktake:view">盘点管理</label>
                  </div>
                </div>
                
                <!-- Documents -->
                <div class="perm-module">
                  <label style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #e5e5e5;cursor:pointer;">
                    <input type="checkbox" class="perm-module-check" data-module="document">
                    <span style="font-weight:600;font-size:13px;">📄 单据中心</span>
                  </label>
                  <div style="padding-left:28px;padding:8px 0 8px 28px;">
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="purchase:view">采购管理</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="transfer:view">调拨管理</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="delivery:view">配送发货</label>
                  </div>
                </div>
                
                <!-- Statistics -->
                <div class="perm-module">
                  <label style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:1px solid #e5e5e5;cursor:pointer;">
                    <input type="checkbox" class="perm-module-check" data-module="statistics">
                    <span style="font-weight:600;font-size:13px;">📈 数据统计</span>
                  </label>
                  <div style="padding-left:28px;padding:8px 0 8px 28px;">
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="statistics:view">查看报表</label>
                    <label style="display:flex;align-items:center;gap:6px;margin-bottom:6px;"><input type="checkbox" class="perm-item" data-perm="statistics:export">导出报表</label>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
