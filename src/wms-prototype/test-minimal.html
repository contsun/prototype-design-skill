<!DOCTYPE html>
<html>
<head>
<style>
body { margin: 0; font-family: sans-serif; }
.layout { display: flex; height: 100vh; }
.sidebar { width: 240px; background: #f0f0f0; padding: 20px; }
.main { flex: 1; background: #ffffff; padding: 20px; }
.nav-item { padding: 10px; cursor: pointer; background: #e0e0e0; margin: 4px 0; }
.nav-item.active { background: #007bff; color: white; }
.page { display: none; }
.page.active { display: block; }
.page h2 { color: #333; }
.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 20px; }
.stat-card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <h1>WMS</h1>
    <div class="nav-item active" onclick="switchPage('dashboard')">综合看板</div>
    <div class="nav-item" onclick="switchPage('accounts')">PDA账号</div>
    <div class="nav-item" onclick="switchPage('roles')">角色权限</div>
  </aside>
  <main class="main">
    <div id="page-dashboard" class="page active">
      <h2>综合看板</h2>
      <div class="stats">
        <div class="stat-card"><h3>1,284</h3><p>今日入库</p></div>
        <div class="stat-card"><h3>986</h3><p>今日出库</p></div>
        <div class="stat-card"><h3>45,672</h3><p>当前库存</p></div>
        <div class="stat-card"><h3>23</h3><p>待处理波次</p></div>
      </div>
    </div>
    <div id="page-accounts" class="page">
      <h2>PDA账号</h2>
      <p>这里是 PDA 账号管理页面</p>
    </div>
    <div id="page-roles" class="page">
      <h2>角色权限</h2>
      <p>这里是角色权限管理页面</p>
    </div>
  </main>
</div>
<script>
function switchPage(name) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
}
</script>
</body>
</html>
